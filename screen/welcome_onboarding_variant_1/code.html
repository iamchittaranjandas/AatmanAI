<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aatman AI Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2bcdee",
              "champagne": "#F7E7CE", 
              "background-light": "#f6f8f8",
              "background-dark": "#101f22",
              "deep-indigo": "#1a1b4b", // Custom deep indigo for the 'sacred' feel
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            backgroundImage: {
              'sacred-gradient': 'radial-gradient(circle at center, #1e293b 0%, #101f22 100%)', // Subtle radial for depth
            }
          },
        },
      }
    </script>
<style>
        /* Custom glow animation for the lotus */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px 0px rgba(43, 205, 238, 0.2); }
            50% { box-shadow: 0 0 40px 10px rgba(43, 205, 238, 0.4); }
        }
        .lotus-glow {
            animation: pulse-glow 4s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased selection:bg-primary selection:text-white overflow-hidden">
<!-- Main Container: Full Screen Height, centered content -->
<div class="relative flex h-screen w-full flex-col items-center justify-between bg-sacred-gradient dark text-white p-6 md:p-12">
<!-- Top Spacer for balance -->
<div class="flex-1"></div>
<!-- Central Hero Section -->
<div class="flex flex-col items-center justify-center w-full max-w-md gap-8 z-10">
<!-- Lotus-Shield Logo Area -->
<div class="relative group">
<!-- Outer Glow Layer -->
<div class="absolute inset-0 rounded-full bg-primary/20 blur-3xl opacity-50 group-hover:opacity-75 transition-opacity duration-1000"></div>
<!-- Icon Container -->
<div class="relative flex items-center justify-center w-48 h-48 rounded-full bg-background-dark border border-primary/30 lotus-glow">
<!-- Placeholder for Lotus-Shield Logo. Using an abstract image as requested for "Lotus Shield Logo" -->
<!-- In a real app, this would be an SVG. Here we simulate the glowing icon with an image and overlay -->
<div class="w-full h-full rounded-full overflow-hidden p-8 flex items-center justify-center relative">
<!-- Abstract representation of Sacred Tech Lotus using Material Icon as base + Gradient -->
<span class="material-symbols-outlined text-[100px] text-transparent bg-clip-text bg-gradient-to-tr from-champagne via-primary to-primary">
                            spa
                        </span>
<!-- Shield overlay icon -->
<span class="material-symbols-outlined text-[40px] text-champagne absolute bottom-10">
                            shield
                        </span>
</div>
</div>
</div>
<!-- Typography -->
<div class="text-center space-y-2 mt-4">
<h1 class="text-3xl md:text-4xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-champagne via-white to-champagne uppercase opacity-90">
                    Aatman AI
                </h1>
<p class="text-lg md:text-xl font-light text-primary/80 tracking-widest">
                    Your Private Sanctuary
                </p>
</div>
</div>
<!-- Bottom Section: Progress Bar -->
<div class="flex-1 flex flex-col justify-end w-full max-w-sm pb-12 gap-4 z-10">
<!-- Progress Bar Component -->
<div class="flex flex-col gap-3">
<div class="w-full rounded-full bg-background-dark border border-white/5 h-1.5 overflow-hidden relative">
<!-- Progress Fill -->
<div class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary/60 to-primary rounded-full w-[35%] shadow-[0_0_10px_rgba(43,205,238,0.8)]"></div>
</div>
<!-- Status Text -->
<div class="flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm text-primary animate-spin">
                        sync
                    </span>
<p class="text-slate-400 text-xs font-medium tracking-wide text-center uppercase">
                        Extracting your local intelligence...
                    </p>
</div>
</div>
</div>
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-primary/5 to-transparent pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none translate-y-1/2 translate-x-1/2"></div>
</div>
</body></html>
