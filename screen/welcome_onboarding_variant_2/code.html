<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aatman AI 360 - Welcome Onboarding Variant 2</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecc8",
                        "primary-dark": "#0ea68d",
                        "accent-gold": "#d4af37",
                        "background-light": "#f6f8f8",
                        "background-dark": "#10221f", // Base dark theme color
                        "indigo-deep": "#0b1121", // Custom deeper indigo for this specific design
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    backgroundImage: {
                        'sacred-pattern': "url('data:image/svg+xml,%3Csvg width=\\'60\\' height=\\'60\\' viewBox=\\'0 0 60 60\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cg fill=\\'none\\' fill-rule=\\'evenodd\\'%3E%3Cg fill=\\'%2313ecc8\\' fill-opacity=\\'0.05\\'%3E%3Cpath d=\\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom Utilities for Glassmorphism & Animations */
        .glass-panel {
            background: rgba(16, 34, 31, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(19, 236, 200, 0.5);
        }

        .logo-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #13ecc8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }
        
        /* Subtle Breathe Animation */
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .animate-breathe {
            animation: breathe 3s infinite ease-in-out;
        }

        /* Rotation for loading ring */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        
        /* Pulse for text */
        @keyframes pulse-opacity {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-text {
            animation: pulse-opacity 2s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-indigo-deep text-white font-display antialiased h-screen w-full overflow-hidden relative selection:bg-primary selection:text-indigo-deep">
<!-- Background Pattern Layer -->
<div class="absolute inset-0 z-0 opacity-40 bg-sacred-pattern pointer-events-none"></div>
<!-- Background Gradient Spotlights -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-[#d4af37]/5 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center justify-between h-full w-full px-6 py-12 md:py-16 max-w-md mx-auto">
<!-- Top Spacer for Visual Balance -->
<div class="flex-1"></div>
<!-- Central Glass Card -->
<div class="glass-panel w-full rounded-3xl p-8 flex flex-col items-center gap-8 border-t border-white/10 relative overflow-hidden">
<!-- Decorative sheen on card -->
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-white/5 to-transparent pointer-events-none"></div>
<!-- Lotus Shield Logo Container -->
<div class="relative flex items-center justify-center w-48 h-48 my-4">
<!-- Progress Ring (SVG) -->
<div class="absolute inset-0 w-full h-full animate-spin-slow opacity-80">
<svg class="w-full h-full text-primary" viewbox="0 0 100 100">
<defs>
<lineargradient id="gradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="#13ecc8" stop-opacity="0"></stop>
<stop offset="100%" stop-color="#13ecc8" stop-opacity="1"></stop>
</lineargradient>
</defs>
<!-- Dashed Ring -->
<circle cx="50" cy="50" fill="none" r="46" stroke="url(#gradient)" stroke-dasharray="10 5" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
</div>
<!-- Inner Glow -->
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full animate-breathe"></div>
<!-- Logo Icon -->
<div class="relative z-10 flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-7xl logo-gradient mb-2 filter drop-shadow-lg" style="font-size: 80px; font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 48;">
                        spa
                    </span>
<span class="material-symbols-outlined text-4xl text-accent-gold/80 absolute" style="font-size: 110px; font-variation-settings: 'FILL' 0, 'wght' 100, 'GRAD' 0, 'opsz' 48; opacity: 0.3;">
                        shield
                    </span>
</div>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-3 text-center z-10">
<h1 class="text-3xl font-bold tracking-tight leading-tight text-white drop-shadow-md">
                    Aatman AI
                </h1>
<p class="text-white/70 text-base font-normal tracking-wide uppercase text-xs">
                    Your Private Sanctuary
                </p>
</div>
<!-- Loading Status -->
<div class="flex flex-col items-center gap-2 w-full mt-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary animate-spin text-sm">
                        sync
                    </span>
<p class="text-primary text-sm font-medium animate-pulse-text tracking-wide">
                        Extracting your local intelligence...
                    </p>
</div>
<!-- Mini Progress Bar -->
<div class="w-32 h-1 bg-white/10 rounded-full overflow-hidden mt-1">
<div class="h-full bg-primary w-2/3 rounded-full shadow-[0_0_10px_rgba(19,236,200,0.8)]"></div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="flex-1 flex flex-col justify-end w-full pb-8">
<button class="group relative w-full flex items-center justify-center overflow-hidden rounded-xl h-14 bg-gradient-to-r from-[#234842] to-[#11221f] border border-primary/30 text-white font-bold tracking-wide transition-all duration-300 hover:shadow-[0_0_20px_rgba(19,236,200,0.4)] hover:border-primary/60">
<!-- Hover Glow Effect -->
<div class="absolute inset-0 w-full h-full bg-primary/0 group-hover:bg-primary/10 transition-colors duration-300"></div>
<span class="relative z-10 flex items-center gap-2 uppercase text-sm tracking-[0.1em]">
                    Begin Journey
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</span>
</button>
<p class="mt-4 text-center text-xs text-white/30">
                Secure. Offline. Private.
            </p>
</div>
</div>
</body></html>
