<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Mobile Login - Aatman AI 360</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecda",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                        "surface-dark": "#193331",
                        "border-dark": "#326762",
                        "text-muted": "#92c9c5",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary selection:text-background-dark min-h-screen flex flex-col">
<!-- Main Container -->
<div class="relative flex flex-1 w-full flex-col overflow-x-hidden overflow-y-auto items-center justify-center p-6">
<!-- Ambient Background Glow -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-15%] left-[-15%] w-[60%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-amber-400/5 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-[400px] flex flex-col gap-8 z-10 relative">
<!-- Header Section -->
<div class="flex flex-col items-center text-center gap-5 pt-4">
<div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-surface-dark to-background-dark border border-border-dark flex items-center justify-center shadow-2xl shadow-primary/5 mb-1 group/logo cursor-pointer">
<span class="material-symbols-outlined text-primary text-5xl group-hover/logo:scale-110 transition-transform duration-300">deployed_code</span>
</div>
<div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">Aatman AI 360</h1>
<p class="text-text-muted text-sm font-normal tracking-wide">Offline Intelligence. Private by Design.</p>
</div>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5 w-full mt-4" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-base font-medium leading-normal ml-1">Email Address</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-text-muted group-focus-within:text-primary transition-colors pointer-events-none">
<span class="material-symbols-outlined">mail</span>
</span>
<input class="form-input w-full rounded-lg bg-[#193331] border border-[#326762] text-white placeholder:text-[#92c9c5] focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-4 text-base font-normal leading-normal transition-all duration-200" placeholder="Enter your email" type="email" value=""/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-base font-medium leading-normal ml-1">Password</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-[#92c9c5] group-focus-within:text-primary transition-colors pointer-events-none">
<span class="material-symbols-outlined">lock</span>
</span>
<input class="form-input w-full rounded-lg bg-[#193331] border border-[#326762] text-white placeholder:text-[#92c9c5] focus:border-primary focus:ring-1 focus:ring-primary h-14 pl-12 pr-12 text-base font-normal leading-normal transition-all duration-200" placeholder="Enter your password" type="password" value=""/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-[#92c9c5] hover:text-white transition-colors cursor-pointer outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="text-[#92c9c5] text-sm font-normal leading-normal underline hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<!-- Primary Action -->
<button class="mt-4 relative group w-full h-14 rounded-lg overflow-hidden cursor-pointer shadow-lg shadow-primary/10">
<div class="absolute inset-0 bg-gradient-to-r from-amber-400 to-[#13ecda] transition-all duration-300 group-hover:scale-105 group-hover:brightness-110"></div>
<span class="relative flex items-center justify-center gap-2 text-[#112221] text-base font-bold leading-normal tracking-[0.015em]">
                        Login
                    </span>
</button>
</form>
<!-- Secondary Actions -->
<div class="flex flex-col items-center gap-6 mt-2">
<!-- Biometric Login -->
<button class="flex flex-col items-center justify-center gap-2 group cursor-pointer" type="button">
<div class="w-14 h-14 rounded-full border border-[#326762] bg-[#193331] flex items-center justify-center text-[#13ecda] group-hover:border-[#13ecda] group-hover:bg-[#13ecda]/10 group-hover:shadow-[0_0_20px_rgba(19,236,218,0.3)] transition-all duration-300">
<span class="material-symbols-outlined text-[28px]">face</span>
</div>
<span class="text-xs text-[#92c9c5] group-hover:text-white transition-colors font-medium">Face ID</span>
</button>
<!-- Create Account -->
<p class="text-[#92c9c5] text-sm font-normal">
                    Don't have an account? <a class="text-white font-bold hover:text-[#13ecda] transition-colors ml-1 underline decoration-transparent hover:decoration-current" href="#">Create Account</a>
</p>
</div>
<!-- Footer Security Badge -->
<div class="mt-8 flex justify-center w-full">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-[#193331]/80 border border-[#326762]/50 backdrop-blur-sm">
<span class="material-symbols-outlined text-[#13ecda] text-lg">encrypted</span>
<span class="text-[11px] uppercase tracking-widest text-[#92c9c5] font-bold">Secure Connection</span>
</div>
</div>
</div>
</div>
</body></html>
